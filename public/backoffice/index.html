<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>West Coast Pest Back Office</title><link rel="icon" href="/assets/favicon.ico"><link rel="apple-touch-icon" href="/assets/apple-touch-icon.png"><link rel="stylesheet" href="/backoffice/style.css"></head><body>
<section id="login" class="login-wrap"><form class="login-card" onsubmit="return false"><div class="brand-mark">WEST COAST PEST<small>WORKFORCE PLATFORM</small></div><h1>Back Office</h1><label>Email, mobile or staff code<input id="identifier" autocomplete="username"></label><label>Password<input id="password" type="password" autocomplete="current-password"></label><button id="loginBtn" class="primary">Log in</button><p id="loginMsg" class="danger"></p></form></section>
<div id="app" class="shell hidden"><aside><div class="logo-block"><img src="/assets/favicon.png" alt="West Coast Pest"><strong>West Coast Pest</strong><span>Back Office</span></div><nav>
<button data-view="dashboard">Dashboard</button><button data-view="staff">Staff</button><button data-view="worksites">Worksites</button><button data-view="assignments">Assignments</button><button data-view="sessions">Sessions</button><button data-view="adjustments">Time Adjustments</button><button data-view="register">Printable Staff Register</button><button data-view="payroll">Date Range / Payroll</button><button data-view="company">Company Setup</button><button data-view="exceptions">Exceptions</button><button data-view="leave">Leave / Absence</button><button data-view="periodTotals">Period Totals by Staff</button><button data-view="audit">Audit Log</button></nav><div class="sidebar-version">v2.3.0</div><button id="logout" class="logout">Logout</button></aside>
<main><header><div><h1 id="title">Dashboard</h1><p id="subtitle">West Coast Pest workforce operations</p></div><span id="mode" class="mode"></span></header><div id="flash"></div><section id="content"></section></main></div>
<div id="modal" class="modal hidden"><div class="modal-card"><button id="modalClose" class="modal-close">×</button><div id="modalBody"></div></div></div>
<script src="/backoffice/app.js"></script></body></html>
